#  Template .NET Core build

#  This template allows you to validate your .NET Core package.
#  The workflow allows running tests and code linting on the default branch.

# To run your pipeline on a Windows machine, create a self-hosted Windows runner.
# For instructions on setting up a Windows runner, see https://support.atlassian.com/bitbucket-cloud/docs/set-up-runners-for-windows/

image: mcr.microsoft.com/dotnet/sdk:8.0

pipelines:
  custom:
    automated:
      - step:
          name: Setup .NET Build
          caches:
            - dotnetcore
          script:
            - echo "Starting build..."
            - dotnet restore
            - dotnet build --configuration Release

      - step:
          name: Setup Selenium Environment
          caches:
            - dotnetcore
          script:
            - apt-get update
            - apt-get install -y wget unzip
            - wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            - apt install -y ./google-chrome-stable_current_amd64.deb
            - wget -q https://storage.googleapis.com/chrome-for-testing-public/134.0.6998.35/linux64/chromedriver-linux64.zip
            - unzip chromedriver-linux64.zip
            - ls -al
            - export CHROMEDRIVER_PATH="/usr/local/bin"
            - mv chromedriver-linux64 $CHROMEDRIVER_PATH/chromedriver
            - chmod +x $CHROMEDRIVER_PATH/chromedriver

      - parallel:
        - step:
            name: PlanosTest (SemPlantaLoja)
            caches:
              - dotnetcore
            script:
              - dotnet test --filter TestCategory=PlanosSemPlantaDeLoja

        - step:
            name: PlanosTest (ComPlantaLoja)
            caches:
              - dotnetcore
            script:
              - dotnet test --filter TestCategory=PlanosComPlantaDeLoja
        
        - step:
            name: DashboardOperacoesTest
            caches:
              - dotnetcore
            script:
              - dotnet test --filter FullyQualifiedName~MeuClienteWebTestProject.DashboardOperacoesTest

        #- step:
            #name: SmartIaTest
            #caches:
              #- dotnetcore
            #script:
              #- dotnet test --filter FullyQualifiedName~MeuClienteWebTestProject.SmartIaTest

definitions:
  caches:
    dotnetcore: ~/.nuget/packages
