#  Template .NET Core build

#  This template allows you to validate your .NET Core package.
#  The workflow allows running tests and code linting on the default branch.

# To run your pipeline on a Windows machine, create a self-hosted Windows runner.
# For instructions on setting up a Windows runner, see https://support.atlassian.com/bitbucket-cloud/docs/set-up-runners-for-windows/

image: mcr.microsoft.com/dotnet/sdk:8.0

pipelines:
  custom:
    automated:
      - step:
          name: Setup .NET Build
          caches:
            - dotnetcore
          script:
            - echo "Starting build..."
            - dotnet restore
            - dotnet build --configuration Release

      - step:
          name: Setup Selenium Environment
          caches:
            - dotnetcore
          script:
            - apt-get update
            - apt-get install -y wget unzip curl
            - wget -q https://storage.googleapis.com/chrome-for-testing-public/144.0.7559.59/linux64/chrome-linux64.zip
            - unzip chrome-linux64.zip
            - mv chrome-linux64/chrome /usr/local/bin/google-chrome
            - chmod +x /usr/local/bin/google-chrome
            - google-chrome --version
            - wget -q https://storage.googleapis.com/chrome-for-testing-public/144.0.7559.59/linux64/chromedriver-linux64.zip
            - unzip chromedriver-linux64.zip
            - mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
            - chmod +x /usr/local/bin/chromedriver
            - which chromedriver
            - chromedriver --version

      - step:
          name: PlanosTest ClienteStart
          caches:
            - dotnetcore
          script:
            - dotnet test --filter TestCategory=Start

      - step:
          name: PlanosTest ClientePro
          caches:
            - dotnetcore
          script:
            - dotnet test --filter TestCategory=Pro

      - step:
          name: PlanosTest ClienteExpert
          caches:
            - dotnetcore
          script:
            - dotnet test --filter TestCategory=Expert

      - step:
          name: DashboardOperacoesTest
          caches:
            - dotnetcore
          script:
            - dotnet test --filter FullyQualifiedName~MeuClienteWebTestProject.DashboardOperacoesTest

definitions:
  caches:
    dotnetcore: ~/.nuget/packages